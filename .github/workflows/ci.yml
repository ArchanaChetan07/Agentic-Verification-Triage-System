name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository (with AgentMesh submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev dependencies
        run: |
          pip install -e ".[dev]"
          pip install -e vendor/agentmesh
          pip install ruff

      - name: Lint (ruff)
        run: ruff check triage/ tests/ scripts/*.py

      - name: Run test suite
        run: pytest -q --tb=short

      - name: Verify real-data integration path
        run: python3 scripts/run_real_data_pipeline.py /tmp/ci_dashboard.html

      - name: Verify dashboard generation
        run: python3 scripts/generate_dashboard.py /tmp/ci_fixture_dashboard.html
